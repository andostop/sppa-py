<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPPA - Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app-container">

    <!-- HEADER SIMPLE -->
    <header>
        <div class="user-info">
            <span>Bienvenido a</span>
            <h2>SPPA</h2>
        </div>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">

        <section style="margin-bottom: 2rem;">
            <h1 style="font-size: 3rem; color: var(--dark);">
                👨‍🍳 SPPA - Tu chef de confianza
            </h1>
            <p style="color: #6b7280; font-size: 1.1rem;">
                Ingresa tu usuario para comenzar tu experiencia culinaria
            </p>
        </section>

        <!-- FORMULARIO -->
        <form action="/auth" method="POST" style="display: flex; flex-direction: column; align-items: center; gap: 1.5rem;">

            <input 
                type="text" 
                name="usuario" 
                placeholder="Ej: Nombre de usuario" 
                required
                style="text-align: center;"
            >

            <button type="submit" class="btn-submit" style="font-size: 1.2rem;">
                <i class="fas fa-sign-in-alt"></i> Ingresar al Sistema
            </button>

        </form>

        <!-- MINI CARD DECORATIVA -->
        <div style="margin-top: 3rem; padding: 2rem; background: var(--light); border-radius: 1.5rem; border: 1px solid #e5e7eb;">
            <p style="color: var(--dark); font-weight: 600;">
                🍽️ Descubre recetas personalizadas según tu dieta, alergias y objetivos
            </p>
        </div>

    </main>

</div>

</body>
</html>
