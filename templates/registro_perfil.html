<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Chef IA - Registro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="user-info">
                <h2>Bienvenido, {{ nombre }}</h2>
                <p>Crea tu perfil nutricional para continuar</p>
            </div>
        </header>
        <main class="main-content">
            <form action="/completar_registro" method="POST" style="max-width: 500px; margin: 0 auto; text-align: left;">
                <input type="hidden" name="nombre" value="{{ nombre }}">
                
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div style="flex: 1;">
                        <label style="font-weight: 700;">Peso (kg):</label>
                        <input type="number" name="peso" placeholder="Ej: 75.5" required>
                    </div>
                    <div style="flex: 1;">
                        <label style="font-weight: 700;">Altura (m):</label>
                        <input type="number" step="0.01" name="altura" placeholder="Ej: 1.80" required>
                    </div>
                </div>

                <label style="font-weight: 700;">Sexo:</label>
                <div style="display: flex; gap: 1rem; margin-bottom: 1rem; margin-top: 0.5rem;">
                    <label style="flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer;">
                        <input type="radio" name="sexo" value="M" checked style="margin-right: 5px;"> Masculino
                    </label>
                    <label style="flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer;">
                        <input type="radio" name="sexo" value="F" style="margin-right: 5px;"> Femenino
                    </label>
                </div>

                <label style="font-weight: 700;">Presupuesto Diario (S/):</label>
                <input type="number" step="0.50" name="presupuesto" placeholder="Ej: 50.00" value="50.00" required style="margin-bottom: 1rem;">

                <label style="font-weight: 700;">¿En qué región te encuentras?</label>
                <select name="region" style="margin-bottom: 1rem;">
                    <option value="Costa">Costa</option>
                    <option value="Sierra">Sierra</option>
                    <option value="Selva">Selva</option>
                </select>

                <!-- INSUMOS FAVORITOS -->
                <label style="font-weight: 700;">
                    Ingredientes o insumos que tienes disponible
                </label>

                <div style="position: relative; margin-top: 0.5rem; margin-bottom: 1rem;">

                    <input
                        type="text"
                        id="buscador-insumos"
                        placeholder="Ej: arroz, pollo, palta..."
                        autocomplete="off"
                    >

                    <!-- RESULTADOS -->
                    <div id="resultados-insumos" style="
                        position: absolute;
                        top: 100%;
                        left: 0;
                        right: 0;

                        background: white;
                        border: 1px solid #ddd;

                        border-radius: 12px;

                        max-height: 220px;
                        overflow-y: auto;

                        z-index: 999;

                        display: none;

                        box-shadow: 0 8px 20px rgba(0,0,0,0.08);
                    ">

                    </div>

                </div>

                <!-- INSUMOS SELECCIONADOS -->
                <div id="insumos-seleccionados" style="
                    display: flex;
                    flex-wrap: wrap;
                    gap: 10px;

                    margin-bottom: 1.5rem;
                ">
                </div>
                <!-- **** -->
                <input type="hidden" name="insumos_ids" id="insumos_ids">

                <label style="font-weight: 700;">¿Tienes alguna alergia?</label>
                <select name="alergia">
                    {% for a in alergias %}
                    <option value="{{ a.id_alergia }}">{{ a.nombre_alergia }}</option>
                    {% endfor %}
                </select>

                <button type="submit" class="btn-submit" style="width: 100%; margin-top: 2rem;">
                    Empezar mi aventura culinaria
                </button>
            </form>
        </main>
    </div>

    <script>
        const insumos = JSON.parse('{{ insumos | tojson | safe }}');

        const buscador = document.getElementById("buscador-insumos");
        const resultados = document.getElementById("resultados-insumos");
        const seleccionadosDiv = document.getElementById("insumos-seleccionados");
        const hiddenInput = document.getElementById("insumos_ids");

        let seleccionados = [];

        buscador.addEventListener("input", () => {

            const texto = buscador.value.toLowerCase().trim();

            resultados.innerHTML = "";

            if(texto.length === 0){
                resultados.style.display = "none";
                return;
            }

            const filtrados = insumos.filter(insumo =>
                insumo.nombre.toLowerCase().includes(texto)
            );

            if(filtrados.length === 0){
                resultados.style.display = "none";
                return;
            }

            resultados.style.display = "block";

            filtrados.slice(0, 10).forEach(insumo => {

                const item = document.createElement("div");

                item.innerHTML = insumo.nombre;

                item.style.padding = "10px";
                item.style.cursor = "pointer";

                item.onmouseenter = () => {
                    item.style.background = "#f3f4f6";
                };

                item.onmouseleave = () => {
                    item.style.background = "white";
                };

                item.onclick = () => agregarInsumo(insumo);

                resultados.appendChild(item);
            });

        });

        function agregarInsumo(insumo){

            const existe = seleccionados.some(i =>
                i.id_insumo == insumo.id_insumo
            );

            if(existe){
                buscador.value = "";
                resultados.style.display = "none";
                return;
            }

            seleccionados.push(insumo);

            renderSeleccionados();

            buscador.value = "";

            resultados.style.display = "none";
        }

        function eliminarInsumo(id){

            seleccionados = seleccionados.filter(i =>
                i.id_insumo != id
            );

            renderSeleccionados();
        }

        function renderSeleccionados(){

            seleccionadosDiv.innerHTML = "";

            seleccionados.forEach(insumo => {

                const tag = document.createElement("div");

                tag.style.display = "flex";
                tag.style.alignItems = "center";
                tag.style.gap = "8px";

                tag.style.background = "#e5e7eb";
                tag.style.padding = "8px 14px";
                tag.style.borderRadius = "999px";

                tag.innerHTML = `
                    <span>${insumo.nombre}</span>

                    <button
                        type="button"
                        onclick="eliminarInsumo(${insumo.id_insumo})"
                        style="
                            background: #ef4444;
                            color: white;
                            border: none;
                            width: 22px;
                            height: 22px;
                            border-radius: 50%;
                            cursor: pointer;
                            font-size: 12px;
                        "
                    >
                        ×
                    </button>
                `;

                seleccionadosDiv.appendChild(tag);
            });

            hiddenInput.value = seleccionados
                .map(i => i.id_insumo)
                .join(",");
        }

</script>
</body>
</html>
