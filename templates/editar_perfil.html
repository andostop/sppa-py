<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef IA - Mi Perfil</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="user-info">
                <h2>Ajustes de Perfil</h2>
                <p>Personaliza tu experiencia culinaria</p>
            </div>
            <a href="/dashboard" class="btn-submit" style="background: rgba(255,255,255,0.1); text-decoration: none;">
                <i class="fas fa-times"></i>
            </a>
        </header>

        <main class="main-content">
            <div style="max-width: 600px; margin: 0 auto; text-align: left;">
                <form action="/actualizar_perfil" method="POST">
                    
                    <div style="margin-bottom: 2rem;">
                        <h3 style="color: var(--dark); margin-bottom: 1rem;"><i class="fas fa-user-circle"></i> Datos Personales</h3>
                        
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Nombre de usuario:</label>
                            <input type="text" value="{{ user.nombre }}" disabled style="background: #eee; cursor: not-allowed;">
                        </div>

                        <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                            <div style="flex: 1;">
                                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Peso actual (kg):</label>
                                <input type="number" step="0.1" name="peso" value="{{ user.peso_kg }}" required>
                            </div>
                            <div style="flex: 1;">
                                <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Altura (m):</label>
                                <input type="number" step="0.01" name="altura" value="{{ user.altura_m }}" required>
                            </div>
                        </div>

                        <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Sexo:</label>
                        <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                            <label style="flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer;">
                                <input type="radio" name="sexo" value="M" {% if user.sexo == 'M' %}checked{% endif %}> Masculino
                            </label>
                            <label style="flex: 1; border: 1px solid #ddd; padding: 10px; border-radius: 8px; text-align: center; cursor: pointer;">
                                <input type="radio" name="sexo" value="F" {% if user.sexo == 'F' %}checked{% endif %}> Femenino
                            </label>
                        </div>
                    </div>

                    <div style="margin-bottom: 2rem;">
                        <h3 style="color: var(--dark); margin-bottom: 1rem;"><i class="fas fa-wallet"></i> Economía y Preferencias</h3>
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Presupuesto Diario (S/):</label>
                            <input type="number" step="0.50" name="presupuesto" value="{{ user.presupuesto_dia }}" required>
                            <small style="color: #888;">Límite de costo para tus recomendaciones del día.</small>
                        </div>
                    </div>

                    <div style="margin-bottom: 2rem;">
                        <h3 style="color: var(--dark); margin-bottom: 1rem;"><i class="fas fa-map-marker-alt"></i> Ubicación y Salud</h3>
                        
                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Región Geográfica:</label>
                            <select name="region">
                                <option value="Costa" {% if user.ubicacion_actual == 'Costa' %}selected{% endif %}>Región Costa</option>
                                <option value="Sierra" {% if user.ubicacion_actual == 'Sierra' %}selected{% endif %}>Región Sierra</option>
                                <option value="Selva" {% if user.ubicacion_actual == 'Selva' %}selected{% endif %}>Región Selva</option>
                            </select>
                        </div>

                        <div style="margin-bottom: 1.5rem;">

                            <label style="display:block; font-weight:600; margin-bottom:0.5rem;">
                                Insumos disponibles:
                            </label>

                            <input
                                type="text"
                                id="buscador-insumos"
                                placeholder="Buscar insumos..."
                                autocomplete="off"
                            >

                            <div id="resultados-insumos"
                                style="
                                    background:white;
                                    border:1px solid #ddd;
                                    border-radius:10px;
                                    margin-top:5px;
                                    max-height:200px;
                                    overflow-y:auto;
                                ">
                            </div>

                            <div id="insumos-seleccionados"
                                style="
                                    margin-top:15px;
                                    display:flex;
                                    flex-wrap:wrap;
                                ">
                            </div>

                            <input
                                type="hidden"
                                name="insumos_ids"
                                id="insumos_ids"
                                value="{{ user.insumos_disponibles }}"
                            >

                        </div>

                        <div style="margin-bottom: 1.5rem;">
                            <label style="display: block; font-weight: 600; margin-bottom: 0.5rem;">Restricción Alimentaria (Alergia):</label>
                            <select name="alergia">
                                {% for a in alergias %}
                                <option value="{{ a.id_alergia }}" {% if user.alergias_id == a.id_alergia %}selected{% endif %}>
                                    {{ a.nombre_alergia }}
                                </option>
                                {% endfor %}
                            </select>
                            <small style="color: #ef4444;">Nota: La IA excluirá platos que contengan insumos prohibidos para ti.</small>
                        </div>
                    </div>

                    <div style="padding-top: 2rem; border-top: 1px solid #eee;">
                        <button type="submit" class="btn-submit" style="width: 100%; font-size: 1.2rem;">
                            <i class="fas fa-save"></i> Guardar Cambios en mi Perfil
                        </button>
                    </div>

                </form>
            </div>
        </main>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", () => {
        const insumos = JSON.parse('{{ insumos | tojson | safe }}');

        const buscador = document.getElementById("buscador-insumos");
        const resultados = document.getElementById("resultados-insumos");
        const seleccionadosDiv = document.getElementById("insumos-seleccionados");
        const hiddenInput = document.getElementById("insumos_ids");

        let seleccionados = [];

        // =========================
        // CARGAR GUARDADOS
        // =========================

        const idsGuardados = (hiddenInput.value || "")
            .split(",")
            .map(x => x.trim())
            .filter(x => x !== "");

        seleccionados = insumos.filter(insumo =>
            idsGuardados.includes(String(insumo.id_insumo))
        );

        renderSeleccionados();

        // =========================
        // BUSCADOR
        // =========================

        buscador.addEventListener("input", () => {

            const texto = buscador.value.toLowerCase().trim();

            resultados.innerHTML = "";

            if(texto.length === 0){
                resultados.style.display = "none";
                return;
            }

            const filtrados = insumos.filter(insumo =>
                insumo.nombre.toLowerCase().includes(texto)
            );

            if(filtrados.length === 0){
                resultados.style.display = "none";
                return;
            }

            resultados.style.display = "block";

            filtrados.slice(0, 10).forEach(insumo => {

                const item = document.createElement("div");

                item.textContent = insumo.nombre;

                item.style.padding = "10px";
                item.style.cursor = "pointer";
                item.style.borderBottom = "1px solid #eee";

                item.addEventListener("mouseenter", () => {
                    item.style.background = "#f3f4f6";
                });

                item.addEventListener("mouseleave", () => {
                    item.style.background = "white";
                });

                item.addEventListener("click", () => {
                    agregarInsumo(insumo);
                });

                resultados.appendChild(item);

            });

        });

        // =========================
        // AGREGAR
        // =========================

        function agregarInsumo(insumo){

            const existe = seleccionados.some(i =>
                String(i.id_insumo) === String(insumo.id_insumo)
            );

            if(existe){
                buscador.value = "";
                resultados.style.display = "none";
                return;
            }

            seleccionados.push(insumo);

            renderSeleccionados();

            buscador.value = "";
            resultados.innerHTML = "";
            resultados.style.display = "none";
        }

        // =========================
        // ELIMINAR
        // =========================

        function eliminarInsumo(id){

            seleccionados = seleccionados.filter(insumo =>
                String(insumo.id_insumo) !== String(id)
            );

            renderSeleccionados();
        }

        // =========================
        // RENDER
        // =========================

        function renderSeleccionados(){

            seleccionadosDiv.innerHTML = "";

            seleccionados.forEach(insumo => {

                const tag = document.createElement("div");

                tag.style.display = "flex";
                tag.style.alignItems = "center";
                tag.style.gap = "8px";

                tag.style.background = "#e5e7eb";
                tag.style.padding = "8px 14px";
                tag.style.borderRadius = "999px";

                const texto = document.createElement("span");

                texto.textContent = insumo.nombre;

                const btn = document.createElement("button");

                btn.type = "button";
                btn.textContent = "×";

                btn.style.background = "#ef4444";
                btn.style.color = "white";
                btn.style.border = "none";
                btn.style.width = "22px";
                btn.style.height = "22px";
                btn.style.borderRadius = "50%";
                btn.style.cursor = "pointer";

                btn.addEventListener("click", () => {
                    eliminarInsumo(insumo.id_insumo);
                });

                tag.appendChild(texto);
                tag.appendChild(btn);

                seleccionadosDiv.appendChild(tag);
            });

            hiddenInput.value = seleccionados
                .map(i => i.id_insumo)
                .join(",");
        }

    });


    </script>

</body>
</html>
